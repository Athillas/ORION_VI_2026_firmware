[env:upesy_wroom]
platform = espressif32
board = upesy_wroom
framework = arduino
lib_deps =
    symlink://../shared_libs/ACS712
    symlink://../shared_libs/Adafruit_NeoPixel
    symlink://../shared_libs/ArduinoJson
    symlink://../shared_libs/Ethernet
    symlink://../shared_libs/PubSubClient
    symlink://../shared_libs/Arduino_CAN
    symlink://../shared_libs/L298N